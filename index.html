<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>川湘家宴 · 微信扫码点餐</title>
    <!-- Font Awesome 6 (免费) 用于菜品图标占位 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- QRCode 生成库 -->
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Helvetica Neue', 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }

        body {
            background-color: #f7f3ee;  /* 暖灰底 */
            padding: 0 0 30px 0;
        }

        .page {
            max-width: 500px;            /* 移动端卡片宽度 */
            margin: 0 auto;
            background-color: #fffcf9;
            box-shadow: 0 0 40px rgba(0,0,0,0.05);
            border-radius: 32px 32px 0 0;
            overflow: hidden;
        }

        /* 二维码名片区域 —— 带背景图 */
        .qr-hero {
            position: relative;
            padding: 24px 20px 30px 20px;
            color: #3e2c1b;
            background-image: url('data:image/svg+xml;utf8,<svg width="60" height="60" viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg" opacity="0.15"><path d="M20 10 Q30 0 40 10 L50 20 Q60 30 50 40 L40 50 Q30 60 20 50 L10 40 Q0 30 10 20 Z" fill="%23b34b3a" /></svg>'), 
            linear-gradient(145deg, #fae3d1 0%, #f3d3bc 100%);
            background-repeat: repeat, no-repeat;
            background-size: 80px 80px, cover;
            background-position: 10px 10px, center;
            border-bottom: 4px solid #b64b2c;
            box-shadow: inset 0 -2px 10px rgba(92, 42, 21, 0.1);
        }

        /* 深色半透明遮罩，保证文字可读 (增强背景图对比) */
        .qr-hero::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(250, 235, 220, 0.4);
            pointer-events: none;
        }

        .qr-container {
            position: relative;
            z-index: 2;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 15px;
        }

        .brand {
            flex: 2 1 180px;
        }

        .brand h1 {
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: 4px;
            color: #4f2d1a;
            line-height: 1.1;
            text-shadow: 2px 2px 0 rgba(255,215,185,0.5);
            margin-bottom: 6px;
        }

        .brand h1 small {
            font-size: 1rem;
            font-weight: 300;
            display: block;
            color: #733c23;
            letter-spacing: 1px;
        }

        .slogan {
            font-size: 0.9rem;
            color: #5e3825;
            background: rgba(255,255,240,0.5);
            display: inline-block;
            padding: 6px 12px;
            border-radius: 40px;
            backdrop-filter: blur(2px);
            border: 1px solid #dbaa89;
            margin-top: 8px;
        }

        .qrcode-box {
            background: #fefaf5;
            padding: 12px 12px 8px 12px;
            border-radius: 24px;
            box-shadow: 0 8px 20px rgba(110, 50, 20, 0.3);
            text-align: center;
            width: 140px;
            border: 2px solid #b1552c;
        }

        .qrcode-box canvas {
            display: block;
            width: 120px;
            height: 120px;
            margin: 0 auto;
            border-radius: 16px;
        }

        .qrcode-box p {
            font-size: 0.75rem;
            color: #623a22;
            margin-top: 6px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .qrcode-box i {
            color: #b45128;
            margin-right: 4px;
        }

        /* 分类导航提示 */
        .category-tag {
            padding: 18px 16px 6px 16px;
            font-size: 1.5rem;
            font-weight: 600;
            color: #502e1b;
            border-bottom: 3px solid #e2b18b;
            margin-top: 6px;
            background: #fffcf9;
        }

        .category-tag i {
            color: #c0653a;
            margin-right: 10px;
            font-size: 1.8rem;
            vertical-align: middle;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
            padding: 16px 16px 20px 16px;
            background: #fffcf9;
        }

        /* 菜品卡片 */
        .dish-card {
            background: white;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 6px 18px rgba(158, 89, 49, 0.08);
            transition: transform 0.2s ease;
            border: 1px solid #ffe5d5;
            display: flex;
            flex-direction: column;
        }

        .dish-card:active {
            transform: scale(0.98);
        }

        .dish-img {
            width: 100%;
            aspect-ratio: 1 / 1;
            background: #f7d5bc;  /* 暖色基底 */
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.2rem;
            font-weight: 600;
            color: #a34826;
            text-shadow: 2px 2px 0 #ffc5a0;
            background-image: radial-gradient(circle at 30% 30%, #ffd8be, #ebba99);
            position: relative;
        }

        /* 图片占位 显示菜品首字符 + 食物图标叠层 */
        .dish-img span {
            position: relative;
            z-index: 2;
            font-size: 3rem;
            font-weight: 700;
            color: #572e18;
            background: rgba(255,245,225,0.6);
            width: 70px;
            height: 70px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(2px);
            border: 2px solid #fdc6a0;
        }

        .dish-img i {
            position: absolute;
            bottom: 8px;
            right: 8px;
            font-size: 1.4rem;
            color: #9e4e2b;
            opacity: 0.8;
            background: #ffe4cf;
            padding: 6px;
            border-radius: 50%;
        }

        .dish-info {
            padding: 14px 10px 12px 10px;
            background: white;
            border-top: 1px dashed #eebd9e;
        }

        .dish-name {
            font-size: 1rem;
            font-weight: 650;
            color: #2e1c12;
            line-height: 1.35;
            margin-bottom: 6px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .dish-price {
            font-size: 1.3rem;
            font-weight: 800;
            color: #b64926;
            display: flex;
            align-items: baseline;
            gap: 4px;
        }

        .dish-price small {
            font-size: 0.9rem;
            font-weight: 400;
            color: #8f623f;
        }

        .unit {
            font-size: 0.8rem;
            color: #a27253;
            margin-left: 2px;
        }

        .remark {
            padding: 5px 16px 15px 16px;
            font-size: 0.7rem;
            color: #ab7f63;
            text-align: right;
            border-top: 1px dotted #e5cfbe;
            background: #fffaf5;
            letter-spacing: 0.3px;
        }

        .remark i {
            color: #c47a52;
            margin-right: 5px;
        }

        .footer-note {
            text-align: center;
            color: #b1907a;
            font-size: 0.75rem;
            padding: 18px 0 8px 0;
            background: #fffcf9;
        }
    </style>
</head>
<body>
    <div class="page">
        <!-- 二维码名片 (带背景图) -->
        <div class="qr-hero">
            <div class="qr-container">
                <div class="brand">

                </div>
                <div class="qrcode-box" id="qrcodeBox">
                    <canvas id="qrCanvas" width="120" height="120"></canvas>

    </div>

            // 按分类聚合 (保留分类顺序)
            const categoryOrder = ["凉菜", "热菜", "素菜", "汤菜", "主食"];
            const grouped = {};
            menuData.forEach(item => {
                if (!grouped[item.category]) grouped[item.category] = [];
                grouped[item.category].push(item);
            });

            // 生成菜单HTML
            const container = document.getElementById('dynamicMenu');
            let htmlStr = '';

            categoryOrder.forEach(cat => {
                if (!grouped[cat] || grouped[cat].length === 0) return;
                htmlStr += `<div class="category-tag"><i class="fas fa-${cat === '凉菜' ? 'snowflake' : (cat === '热菜' ? 'fire' : (cat === '素菜' ? 'seedling' : (cat === '汤菜' ? 'mug-saucer' : 'bowl-food')))}"></i>${cat}</div>`;
                htmlStr += `<div class="menu-grid">`;

                grouped[cat].forEach(dish => {
                    // 为每个菜品生成卡片
                    htmlStr += `
                        <div class="dish-card">
                            <div class="dish-img">
                                <span>${dish.imgChar}</span>
                                <i class="fas fa-${cat === '凉菜' ? 'carrot' : (cat === '热菜' ? 'drumstick-bite' : (cat === '素菜' ? 'leaf' : (cat === '汤菜' ? 'bowl-food' : 'wheat-awn')))}"></i>

            // 但为了保证二维码能识别，直接使用当前url
            QRCode.toCanvas(qrCanvas, currentUrl, { width: 120, margin: 1, color: { dark: '#3f2a1b', light: '#fffaf2' } }, function (error) {

                else console.log('二维码生成成功! 扫码即可进入点餐页面');
            });
        })();

</html>
